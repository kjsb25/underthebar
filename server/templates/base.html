<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #262626;
      --text: #e8e8e8;
      --muted: #9a9a9a;
      --accent: #fc4c02;
      --ok: #4caf50;
      --warn: #f5a623;
      --err: #e34a3a;
      --border: #3a3a3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
    }
    header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 20px;
    }
    header h1 { font-size: 1.1rem; margin: 0; }
    nav a {
      color: var(--text); text-decoration: none; padding: 6px 12px; border-radius: 4px;
    }
    nav a:hover { background: rgba(255,255,255,0.06); }
    nav a.active { background: var(--accent); color: white; }
    main { max-width: 960px; margin: 0 auto; padding: 20px; }
    section.card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 20px; margin-bottom: 16px;
    }
    section.card h2 { margin-top: 0; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; margin: 8px 0 4px; color: var(--muted); font-size: 0.9rem; }
    input[type=text], input[type=password], input[type=number] {
      width: 100%; padding: 8px 10px; background: #1a1a1a; border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 0.95rem;
    }
    button, .btn {
      background: var(--accent); border: none; color: white; padding: 8px 16px;
      border-radius: 4px; cursor: pointer; font-size: 0.95rem; display: inline-block;
      text-decoration: none;
    }
    button:hover, .btn:hover { filter: brightness(1.1); }
    button.secondary { background: #444; }
    button.danger { background: var(--err); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .row > * { flex: 1; min-width: 0; }
    .row.tight { gap: 6px; }
    .row.tight > button { flex: 0 0 auto; }
    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 0.8rem; font-weight: 600;
    }
    .pill.ok { background: var(--ok); color: white; }
    .pill.warn { background: var(--warn); color: black; }
    .pill.err { background: var(--err); color: white; }
    .muted { color: var(--muted); }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;
    }
    .stat { background: #1a1a1a; padding: 12px; border-radius: 6px; border: 1px solid var(--border); }
    .stat .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
    .stat .value { font-size: 1.4rem; font-weight: 600; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
    .log { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.85rem; }
    .log .ERROR { color: var(--err); }
    .log .WARN { color: var(--warn); }
    .log .INFO { color: var(--muted); }
    .checkbox-row { display: flex; flex-wrap: wrap; gap: 16px; margin: 8px 0; }
    .checkbox-row label {
      display: flex; align-items: center; gap: 6px; color: var(--text); margin: 0;
    }
    .toast {
      padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 0.9rem;
    }
    .toast.ok { background: rgba(76,175,80,0.15); border: 1px solid var(--ok); }
    .toast.err { background: rgba(227,74,58,0.15); border: 1px solid var(--err); }
    form { margin: 0; }
    .activity {
      display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .activity:last-child { border-bottom: none; }
    .activity .meta { flex: 1; }
    .activity .meta .name { font-weight: 500; }
    .activity .meta .sub { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>Strava → Hevy</h1>
    <nav>
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
      <a href="/auth" class="{% if request.url.path == '/auth' %}active{% endif %}">Auth</a>
    </nav>
    <div style="flex:1"></div>
    <span class="pill {% if strava_authorized %}ok{% else %}warn{% endif %}">Strava {{ "ok" if strava_authorized else "?" }}</span>
    <span class="pill {% if hevy_authorized %}ok{% else %}warn{% endif %}">Hevy {{ "ok" if hevy_authorized else "?" }}</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
